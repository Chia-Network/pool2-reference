repos:
  - repo: local
    hooks:
      - id: init_py_files
        name: __init__.py files
        entry: ./activated.py python build-init-files.py -v --root . --tree chia-pool
        language: system
        pass_filenames: false
  - repo: local
    hooks:
      - id: ruff_format
        name: ruff format
        entry: ./activated.py ruff format
        language: system
        require_serial: true
        types_or: [python, pyi]
  - repo: local
    hooks:
      - id: ruff
        name: Ruff
        entry: ./activated.py ruff check --fix
        language: system
        types: [python]
  - repo: local
    hooks:
      - id: poetry
        name: poetry
        entry: ./activated.py --poetry python poetry-check.py
        language: system
        pass_filenames: false
        files: "^(poetry.lock|poetry.toml|pyproject.toml)$"
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [ini, json, toml, yaml, markdown]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["--diff", "--write", "-i", "2"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
        exclude: ".*?(.hex|.clsp|.clvm|.clib)"
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-ast
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: ./activated.py mypy
        language: system
        pass_filenames: false
